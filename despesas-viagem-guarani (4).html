<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Despesas de Viagem — Guarani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  :root{
    --verde:#14532d;
    --vermelho:#d62828;
    --areia:#f7f3ec;
    --cartao:#ffffff;
    --tinta:#1c1c1a;
    --cinza:#8a8578;
    --linha:#e8e2d6;
    --radius:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--areia);
    color:var(--tinta);
    max-width:480px;
    margin:0 auto;
    padding-bottom:110px;
  }
  header{
    background:var(--verde);
    color:#fff;
    padding:22px 20px 22px;
    border-radius:0 0 28px 28px;
  }
  .rotulo{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;opacity:.75;font-weight:600}
  .total{
    font-family:'Sora',sans-serif;
    font-size:clamp(1.9rem,9vw,2.6rem);
    font-weight:800;
    margin-top:4px;
    word-break:break-all;
  }
  .total .simbolo{font-size:.55em;font-weight:600;opacity:.8;margin-right:4px}
  .btn-relatorio{
    margin-top:14px;width:100%;
    background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.35);
    color:#fff;border-radius:12px;padding:12px;
    font-family:'Sora',sans-serif;font-weight:700;font-size:.92rem;cursor:pointer;
  }
  .btn-relatorio:active{background:rgba(255,255,255,.25)}
  .btn-relatorio:disabled{opacity:.6}
  main{padding:18px 16px}
  h2{
    font-family:'Sora',sans-serif;font-size:.85rem;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;color:var(--cinza);
    margin:18px 4px 10px;
  }
  .categorias{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 6px;scrollbar-width:none}
  .categorias::-webkit-scrollbar{display:none}
  .chip-cat{
    flex:0 0 auto;background:var(--cartao);border:1.5px solid var(--linha);
    border-radius:999px;padding:8px 14px;font-size:.85rem;font-weight:500;
    color:var(--tinta);cursor:pointer;transition:.15s;
  }
  .chip-cat.ativa{background:var(--verde);border-color:var(--verde);color:#fff;font-weight:600}
  .grupo-dia{
    font-size:.75rem;font-weight:600;color:var(--cinza);
    margin:12px 4px 6px;display:flex;justify-content:space-between;
  }
  .lista{display:flex;flex-direction:column}
  .item{
    background:var(--cartao);border-radius:var(--radius);
    padding:13px 14px;display:flex;align-items:center;gap:10px;
    border:1px solid var(--linha);margin-bottom:8px;
  }
  .item .emoji{font-size:1.3rem}
  .item .info{flex:1;min-width:0}
  .item .desc{font-weight:600;font-size:.95rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item .meta{font-size:.73rem;color:var(--cinza);margin-top:2px}
  .item .valor{
    font-family:'Sora',sans-serif;font-weight:700;font-size:.92rem;white-space:nowrap;
  }
  .item .acao-item{
    background:none;border:none;color:var(--cinza);font-size:1rem;
    padding:6px;cursor:pointer;border-radius:8px;
  }
  .item .acao-item:active{background:#f3ede2}
  .item .apagar.confirmar{color:#fff;background:var(--vermelho)}
  .vazio{
    text-align:center;color:var(--cinza);padding:40px 20px;font-size:.92rem;line-height:1.5;
  }
  .vazio .emoji{font-size:2.2rem;display:block;margin-bottom:10px}
  .resumo{display:flex;flex-direction:column;gap:6px;margin-bottom:6px}
  .barra-linha{display:flex;align-items:center;gap:10px;font-size:.82rem}
  .barra-linha .nome{width:110px;flex:0 0 auto;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .barra-trilho{flex:1;height:8px;background:var(--linha);border-radius:99px;overflow:hidden}
  .barra-fill{height:100%;background:var(--verde);border-radius:99px}
  .barra-linha .pct{width:44px;text-align:right;color:var(--cinza);font-variant-numeric:tabular-nums}
  .fab{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--vermelho);color:#fff;border:none;
    font-family:'Sora',sans-serif;font-weight:700;font-size:1rem;
    padding:16px 30px;border-radius:999px;cursor:pointer;
    box-shadow:0 8px 24px rgba(214,40,40,.35);
    display:flex;align-items:center;gap:8px;z-index:20;
  }
  .fab:active{transform:translateX(-50%) scale(.97)}
  .modal-fundo{
    position:fixed;inset:0;background:rgba(20,30,20,.45);
    display:none;align-items:flex-end;justify-content:center;z-index:30;
  }
  .modal-fundo.aberto{display:flex}
  .modal{
    background:var(--cartao);width:100%;max-width:480px;
    border-radius:24px 24px 0 0;padding:22px 20px 30px;
    animation:sobe .22s ease-out;
    max-height:92vh;overflow-y:auto;
  }
  @keyframes sobe{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
  @media (prefers-reduced-motion:reduce){.modal{animation:none}}
  .modal h3{font-family:'Sora',sans-serif;font-size:1.1rem;margin-bottom:16px}
  .campo{margin-bottom:14px}
  .campo label{display:block;font-size:.78rem;font-weight:600;color:var(--cinza);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
  .campo input{
    width:100%;border:1.5px solid var(--linha);border-radius:12px;
    padding:13px 14px;font-size:1rem;font-family:'Inter',sans-serif;background:var(--areia);
  }
  .campo input:focus{outline:none;border-color:var(--verde)}
  #valorInput{font-family:'Sora',sans-serif;font-weight:700;font-size:1.4rem;text-align:right}
  .linha-dupla{display:flex;gap:10px}
  .linha-dupla .campo{flex:1}
  .chips-modal{display:flex;flex-wrap:wrap;gap:8px}
  .chips-modal .chip-cat{padding:9px 13px}
  .acoes{display:flex;gap:10px;margin-top:20px}
  .btn{
    flex:1;border:none;border-radius:14px;padding:15px;font-size:1rem;
    font-family:'Sora',sans-serif;font-weight:700;cursor:pointer;
  }
  .btn-salvar{background:var(--verde);color:#fff}
  .btn-cancelar{background:var(--linha);color:var(--tinta)}
  .aviso{
    position:fixed;top:14px;left:50%;transform:translateX(-50%);
    background:var(--tinta);color:#fff;padding:10px 18px;border-radius:99px;
    font-size:.85rem;z-index:50;display:none;max-width:90%;text-align:center;line-height:1.4;box-shadow:0 6px 20px rgba(0,0,0,.25);
  }
</style>
</head>
<body>

<header>
  <div class="rotulo">Total da viagem</div>
  <div class="total"><span class="simbolo">₲</span><span id="totalPyg">0</span></div>
  <button class="btn-relatorio" id="btnRelatorio">📄 Gerar relatório em PDF</button>
  <a id="linkPdf" href="#" download="relatorio.pdf" style="display:none;margin-top:10px;background:#fff;color:var(--verde);text-align:center;padding:12px;border-radius:12px;font-family:'Sora',sans-serif;font-weight:700;font-size:.92rem;text-decoration:none;">⬇️ Abrir o PDF</a>
</header>

<main>
  <h2>Filtrar por despesa</h2>
  <div class="categorias" id="filtros"></div>

  <h2>Lançamentos</h2>
  <div class="lista" id="lista"></div>

  <div id="blocoResumo" style="display:none">
    <h2>Por tipo de despesa</h2>
    <div class="resumo" id="resumoCat"></div>
    <h2>Por forma de pagamento</h2>
    <div class="resumo" id="resumoPag"></div>
  </div>
</main>

<button class="fab" id="abrirModal">＋ Nova despesa</button>

<div class="modal-fundo" id="modalFundo">
  <div class="modal" role="dialog" aria-modal="true" aria-label="Despesa">
    <h3 id="tituloModal">Nova despesa</h3>
    <div class="linha-dupla">
      <div class="campo">
        <label for="valorInput">Valor (₲)</label>
        <input id="valorInput" inputmode="numeric" placeholder="0" autocomplete="off">
      </div>
      <div class="campo">
        <label for="dataInput">Data da despesa</label>
        <input id="dataInput" type="date">
      </div>
    </div>
    <div class="campo">
      <label>Tipo de despesa</label>
      <div class="chips-modal" id="catsModal"></div>
    </div>
    <div class="campo">
      <label>Forma de pagamento</label>
      <div class="chips-modal" id="pagsModal"></div>
    </div>
    <div class="campo">
      <label for="descInput">Observação (opcional)</label>
      <input id="descInput" placeholder="Ex.: posto Shell, hotel em CDE…" autocomplete="off">
    </div>
    <div class="acoes">
      <button class="btn btn-cancelar" id="cancelar">Cancelar</button>
      <button class="btn btn-salvar" id="salvar">Salvar</button>
    </div>
  </div>
</div>

<div class="aviso" id="aviso"></div>

const CATS = [
  {id:'combustivel', nome:'Combustível',        emoji:'⛽'},
  {id:'almoco',      nome:'Almoço',             emoji:'🍽️'},
  {id:'jantar',      nome:'Jantar',             emoji:'🌙'},
  {id:'hotel',       nome:'Hotel',              emoji:'🏨'},
  {id:'pedagio',     nome:'Pedágio',            emoji:'🛣️'},
  {id:'manutencao',  nome:'Manutenção veículo', emoji:'🔧'},
];
const PAGS = [
  {id:'dinheiro',      nome:'Dinheiro',      emoji:'💵'},
  {id:'credito',       nome:'Crédito',       emoji:'💳'},
  {id:'debito',        nome:'Débito',        emoji:'🏧'},
  {id:'transferencia', nome:'Transferência', emoji:'🔁'},
];

let estado = { gastos: [] };   // gasto: {id, valor, desc, cat, pag, data:'AAAA-MM-DD'}
let filtroAtivo = 'todas';
let catSelecionada = 'combustivel';
let pagSelecionado = 'dinheiro';
let editandoId = null;         // null = criando; id = editando

const fmtPyg = n => n.toLocaleString('pt-BR');
const nomeCat = id => (CATS.find(c=>c.id===id)||{nome:'Outros',emoji:'📌'});
const nomePag = id => (PAGS.find(p=>p.id===id)||{nome:'—',emoji:''});
const hojeISO = () => new Date().toISOString().slice(0,10);
const fmtData = iso => { const [a,m,d] = iso.split('-'); return d+'/'+m+'/'+a; };
const fmtDataCurta = iso => { const [a,m,d] = iso.split('-'); return d+'/'+m; };

// ---------- Camada de armazenamento ----------
// Dentro do Claude usa window.storage; aberto direto no navegador (tablet/celular)
// usa o armazenamento local do próprio navegador.
const store = {
  async get(k){
    if(window.storage) return window.storage.get(k);
    const v = localStorage.getItem(k);
    if(v===null) throw new Error('sem dados');
    return {key:k, value:v};
  },
  async set(k,v){
    if(window.storage) return window.storage.set(k,v);
    localStorage.setItem(k,v);
    return {key:k, value:v};
  }
};

// ---------- Persistência (CRUD: os dados ficam salvos no armazenamento) ----------
async function carregar(){
  try{
    const r = await store.get('viagem-guarani-v3');
    if(r && r.value){
      estado = JSON.parse(r.value);
      if(!estado.gastos) estado.gastos = [];
    }
  }catch(e){
    // sem dados na v3: tenta migrar da versão anterior
    try{
      const antigo = await store.get('viagem-guarani-v2');
      if(antigo && antigo.value){
        const dados = JSON.parse(antigo.value);
        estado.gastos = (dados.gastos||[]).map(g=>{
          // converte 'dd/mm/aaaa' para 'aaaa-mm-dd'
          let iso = hojeISO();
          if(g.data && g.data.includes('/')){
            const p = g.data.split('/');
            if(p.length===3) iso = p[2]+'-'+p[1]+'-'+p[0];
          }
          return {...g, data: iso};
        });
        await salvarDados();
      }
    }catch(e2){ /* primeira vez, sem dados */ }
  }
  render();
}
async function salvarDados(){
  try{
    await store.set('viagem-guarani-v3', JSON.stringify(estado));
  }catch(e){
    mostrarAviso('Não foi possível salvar');
  }
}

// ---------- Render (Read) ----------
function montarBarras(container, grupos, total){
  container.innerHTML='';
  grupos.filter(x=>x.soma>0).sort((a,b)=>b.soma-a.soma).forEach(({nome,emoji,soma})=>{
    const pct = Math.round(soma/total*100);
    const linha = document.createElement('div');
    linha.className='barra-linha';
    linha.innerHTML =
      '<span class="nome">'+emoji+' '+nome+'</span>'+
      '<div class="barra-trilho"><div class="barra-fill" style="width:'+pct+'%"></div></div>'+
      '<span class="pct">'+pct+'%</span>';
    container.appendChild(linha);
  });
}

function render(){
  const lista = document.getElementById('lista');
  const gastos = (filtroAtivo==='todas'
    ? [...estado.gastos]
    : estado.gastos.filter(g=>g.cat===filtroAtivo)
  ).sort((a,b)=> b.data.localeCompare(a.data) || b.id-a.id);

  const total = estado.gastos.reduce((s,g)=>s+g.valor,0);
  document.getElementById('totalPyg').textContent = fmtPyg(total);

  // filtros
  const filtros = document.getElementById('filtros');
  filtros.innerHTML = '';
  const todas = document.createElement('button');
  todas.className = 'chip-cat'+(filtroAtivo==='todas'?' ativa':'');
  todas.textContent = 'Todas';
  todas.onclick = ()=>{filtroAtivo='todas';render()};
  filtros.appendChild(todas);
  CATS.forEach(c=>{
    const b = document.createElement('button');
    b.className = 'chip-cat'+(filtroAtivo===c.id?' ativa':'');
    b.textContent = c.emoji+' '+c.nome;
    b.onclick = ()=>{filtroAtivo=c.id;render()};
    filtros.appendChild(b);
  });

  // lista agrupada por dia
  lista.innerHTML = '';
  if(gastos.length===0){
    lista.innerHTML = '<div class="vazio"><span class="emoji">🧉</span>Nenhuma despesa por aqui ainda.<br>Toque em <b>＋ Nova despesa</b> para registrar a primeira.</div>';
  }else{
    let diaAtual = null;
    gastos.forEach(g=>{
      if(g.data!==diaAtual){
        diaAtual = g.data;
        const somaDia = gastos.filter(x=>x.data===diaAtual).reduce((s,x)=>s+x.valor,0);
        const cab = document.createElement('div');
        cab.className='grupo-dia';
        cab.innerHTML = '<span>📅 '+fmtData(diaAtual)+'</span><span>₲ '+fmtPyg(somaDia)+'</span>';
        lista.appendChild(cab);
      }
      const c = nomeCat(g.cat);
      const p = nomePag(g.pag);
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML =
        '<span class="emoji">'+c.emoji+'</span>'+
        '<div class="info"><div class="desc"></div><div class="meta">'+p.emoji+' '+p.nome+'</div></div>'+
        '<span class="valor">₲ '+fmtPyg(g.valor)+'</span>'+
        '<button class="acao-item editar" aria-label="Editar despesa">✏️</button>'+
        '<button class="acao-item apagar" aria-label="Apagar despesa">✕</button>';
      div.querySelector('.desc').textContent = g.desc || c.nome;
      div.querySelector('.editar').onclick = ()=>abrirEdicao(g.id);
      const btnApagar = div.querySelector('.apagar');
      btnApagar.onclick = ()=>apagar(g.id, btnApagar);
      lista.appendChild(div);
    });
  }

  // resumos
  const bloco = document.getElementById('blocoResumo');
  if(total>0){
    bloco.style.display='block';
    montarBarras(
      document.getElementById('resumoCat'),
      CATS.map(c=>({nome:c.nome,emoji:c.emoji,soma:estado.gastos.filter(g=>g.cat===c.id).reduce((s,g)=>s+g.valor,0)})),
      total
    );
    montarBarras(
      document.getElementById('resumoPag'),
      PAGS.map(p=>({nome:p.nome,emoji:p.emoji,soma:estado.gastos.filter(g=>g.pag===p.id).reduce((s,g)=>s+g.valor,0)})),
      total
    );
  }else{
    bloco.style.display='none';
  }
}

// ---------- Delete (com confirmação em dois toques) ----------
function apagar(id, btn){
  if(!btn.classList.contains('confirmar')){
    btn.classList.add('confirmar');
    mostrarAviso('Toque no ✕ de novo para apagar');
    setTimeout(()=>btn.classList.remove('confirmar'), 3000);
    return;
  }
  estado.gastos = estado.gastos.filter(g=>g.id!==id);
  salvarDados();
  render();
  mostrarAviso('Despesa apagada');
}

function mostrarAviso(txt){
  const a = document.getElementById('aviso');
  a.textContent = txt; a.style.display='block';
  setTimeout(()=>a.style.display='none', 4500);
}

// ---------- Modal (Create / Update) ----------
const fundo = document.getElementById('modalFundo');
const valorInput = document.getElementById('valorInput');
const dataInput = document.getElementById('dataInput');
const descInput = document.getElementById('descInput');

function montarChips(containerId, itens, ativo, aoClicar){
  const box = document.getElementById(containerId);
  box.innerHTML='';
  itens.forEach(i=>{
    const b = document.createElement('button');
    b.className='chip-cat'+(ativo===i.id?' ativa':'');
    b.textContent = i.emoji+' '+i.nome;
    b.onclick = ()=>aoClicar(i.id);
    box.appendChild(b);
  });
}
function atualizarModal(){
  montarChips('catsModal', CATS, catSelecionada, id=>{catSelecionada=id;atualizarModal()});
  montarChips('pagsModal', PAGS, pagSelecionado, id=>{pagSelecionado=id;atualizarModal()});
}

function abrirModal(){
  fundo.classList.add('aberto');
  atualizarModal();
  setTimeout(()=>valorInput.focus(),100);
}

// Create
document.getElementById('abrirModal').onclick = ()=>{
  editandoId = null;
  document.getElementById('tituloModal').textContent = 'Nova despesa';
  valorInput.value=''; descInput.value='';
  dataInput.value = hojeISO();
  catSelecionada='combustivel'; pagSelecionado='dinheiro';
  abrirModal();
};

// Update
function abrirEdicao(id){
  const g = estado.gastos.find(x=>x.id===id);
  if(!g) return;
  editandoId = id;
  document.getElementById('tituloModal').textContent = 'Editar despesa';
  valorInput.value = fmtPyg(g.valor);
  dataInput.value = g.data;
  descInput.value = g.desc || '';
  catSelecionada = g.cat;
  pagSelecionado = g.pag;
  abrirModal();
}

document.getElementById('cancelar').onclick = ()=>fundo.classList.remove('aberto');
fundo.addEventListener('click', e=>{ if(e.target===fundo) fundo.classList.remove('aberto'); });

valorInput.addEventListener('input', ()=>{
  const digitos = valorInput.value.replace(/\D/g,'').slice(0,12);
  valorInput.value = digitos ? Number(digitos).toLocaleString('pt-BR') : '';
});

document.getElementById('salvar').onclick = ()=>{
  const valor = Number(valorInput.value.replace(/\D/g,''));
  if(!valor){ mostrarAviso('Informe o valor da despesa'); return; }
  if(!dataInput.value){ mostrarAviso('Informe a data da despesa'); return; }
  const dados = {
    valor,
    desc: descInput.value.trim(),
    cat: catSelecionada,
    pag: pagSelecionado,
    data: dataInput.value
  };
  if(editandoId!==null){
    const i = estado.gastos.findIndex(g=>g.id===editandoId);
    if(i>-1) estado.gastos[i] = {...estado.gastos[i], ...dados};
    mostrarAviso('Despesa atualizada');
  }else{
    estado.gastos.push({id: Date.now(), ...dados});
  }
  salvarDados();
  fundo.classList.remove('aberto');
  render();
};

// ---------- Relatório PDF ----------
document.getElementById('btnRelatorio').onclick = async ()=>{
  if(estado.gastos.length===0){ mostrarAviso('Registre alguma despesa primeiro'); return; }
  if(!window.jspdf){
    mostrarAviso('Sem internet: conecte o tablet e tente de novo');
    return;
  }
  const btn = document.getElementById('btnRelatorio');
  btn.disabled = true; btn.textContent = 'Gerando…';
  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const total = estado.gastos.reduce((s,g)=>s+g.valor,0);
    const hoje = fmtData(hojeISO());
    // "Gs." no PDF porque a fonte padrão não tem o símbolo ₲
    const gs = n => 'Gs. ' + n.toLocaleString('pt-BR');

    // período: da despesa mais antiga à mais recente
    const ordenados = [...estado.gastos].sort((a,b)=>a.data.localeCompare(b.data) || a.id-b.id);
    const ini = fmtData(ordenados[0].data);
    const fim = fmtData(ordenados[ordenados.length-1].data);
    const periodo = ini===fim ? ini : ini+' a '+fim;

    // Cabeçalho
    doc.setFillColor(20,83,45);
    doc.rect(0,0,210,34,'F');
    // Logo da empresa (caixa branca à direita)
    doc.setFillColor(255,255,255);
    doc.roundedRect(168,4,28,26,2,2,'F');
    doc.addImage(LOGO_B64,'JPEG',170,5,24,24);
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','bold'); doc.setFontSize(16);
    doc.text('Relatório de Despesas de Viagem', 14, 15);
    doc.setFont('helvetica','normal'); doc.setFontSize(10);
    doc.text('Moeda: Guarani (PYG)  ·  Período: '+periodo+'  ·  Gerado em '+hoje, 14, 24);

    // Total
    doc.setTextColor(28,28,26);
    doc.setFont('helvetica','bold'); doc.setFontSize(14);
    doc.text('Total gasto: '+gs(total), 14, 47);

    // Tabela de despesas (em ordem cronológica)
    const linhas = ordenados.map(g=>[
      fmtData(g.data),
      g.desc || nomeCat(g.cat).nome,
      nomeCat(g.cat).nome,
      nomePag(g.pag).nome,
      gs(g.valor)
    ]);
    doc.autoTable({
      startY: 54,
      head: [['Data','Observação','Despesa','Pagamento','Valor']],
      body: linhas,
      foot: [['','','','TOTAL', gs(total)]],
      headStyles:{fillColor:[20,83,45],fontStyle:'bold'},
      footStyles:{fillColor:[232,226,214],textColor:[28,28,26],fontStyle:'bold',halign:'right'},
      styles:{fontSize:9,cellPadding:2.5},
      columnStyles:{4:{halign:'right',fontStyle:'bold'}},
      alternateRowStyles:{fillColor:[247,243,236]},
    });

    // Resumo por tipo de despesa
    let y = doc.lastAutoTable.finalY + 10;
    if(y > 240){ doc.addPage(); y = 20; }
    doc.setFont('helvetica','bold'); doc.setFontSize(12);
    doc.text('Resumo por tipo de despesa', 14, y);
    doc.autoTable({
      startY: y+4,
      head: [['Despesa','Total','%']],
      body: CATS
        .map(c=>({c, soma: estado.gastos.filter(g=>g.cat===c.id).reduce((s,g)=>s+g.valor,0)}))
        .filter(x=>x.soma>0).sort((a,b)=>b.soma-a.soma)
        .map(({c,soma})=>[c.nome, gs(soma), Math.round(soma/total*100)+'%']),
      headStyles:{fillColor:[20,83,45],fontStyle:'bold'},
      styles:{fontSize:9,cellPadding:2.5},
      columnStyles:{1:{halign:'right'},2:{halign:'right'}},
    });

    // Resumo por forma de pagamento
    y = doc.lastAutoTable.finalY + 10;
    if(y > 240){ doc.addPage(); y = 20; }
    doc.setFont('helvetica','bold'); doc.setFontSize(12);
    doc.text('Resumo por forma de pagamento', 14, y);
    doc.autoTable({
      startY: y+4,
      head: [['Pagamento','Total','%']],
      body: PAGS
        .map(p=>({p, soma: estado.gastos.filter(g=>g.pag===p.id).reduce((s,g)=>s+g.valor,0)}))
        .filter(x=>x.soma>0).sort((a,b)=>b.soma-a.soma)
        .map(({p,soma})=>[p.nome, gs(soma), Math.round(soma/total*100)+'%']),
      headStyles:{fillColor:[20,83,45],fontStyle:'bold'},
      styles:{fontSize:9,cellPadding:2.5},
      columnStyles:{1:{halign:'right'},2:{halign:'right'}},
    });

    const nomeArquivo = 'relatorio-viagem-'+hojeISO()+'.pdf';

    // Gera o PDF como data URI (mais confiável que Blob quando o app roda
    // como arquivo local no tablet, onde downloads e abas via Blob falham).
    const dataUri = doc.output('datauristring');

    const link = document.getElementById('linkPdf');
    link.href = dataUri;
    link.download = nomeArquivo;
    link.style.display = 'block';

    // Tenta abrir/baixar automaticamente
    try{ link.click(); }catch(e){ /* alguns navegadores exigem toque manual */ }

    mostrarAviso('PDF pronto! Se não abriu sozinho, toque no botão branco "Abrir o PDF" abaixo');
  }catch(e){
    mostrarAviso('Erro ao gerar o PDF. Verifique a internet e tente de novo');
  }
  btn.disabled = false; btn.textContent = '📄 Gerar relatório em PDF';
};

carregar();
</script>
